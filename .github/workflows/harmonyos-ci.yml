name: HarmonyOS CI/CD Pipeline

on:
  push:
    branches:
      - main
      - openharmony_master
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - openharmony_master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container: ghcr.io/bytemain/harmony-next-pipeline-docker/harmonyos-ci-image:v6.0.2.642

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 安装项目依赖
      - name: Install dependencies
        run: |
          cd $GITHUB_WORKSPACE
          ohpm install --all

      # 3. 构建 HAP 文件
      - name: Build HAP
        run: |
          cd $GITHUB_WORKSPACE
          hvigorw clean --no-daemon
          hvigorw assembleHap --mode module -p product=default -p buildMode=debug --no-daemon

      # 4. 获取构建输出路径
      - name: Get build output path
        id: get_build_output_path
        run: |
          cd $GITHUB_WORKSPACE
          echo "output_path=$(ls -d $PWD/entry/build/default/outputs/default)" >> $GITHUB_OUTPUT

      # 5. 上传构建输出作为 artifact
      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ${{ steps.get_build_output_path.outputs.output_path }}

  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container: ghcr.io/bytemain/harmony-next-pipeline-docker/harmonyos-ci-image:v6.0.2.642

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 安装项目依赖
      - name: Install dependencies
        run: |
          cd $GITHUB_WORKSPACE
          ohpm install --all

      # 3. 编译单元测试（CI 环境没有 previewer，无法执行测试，仅验证编译通过）
      - name: Compile unit tests
        run: |
          cd $GITHUB_WORKSPACE
          # hvigorw test compiles tests then tries to execute via previewer.
          # The CI container has no previewer/emulator, so GenerateUnitTestResult
          # always fails. We run the command and check only for compilation errors.
          set +e
          hvigorw test --mode module -p product=default --no-daemon 2>&1 | tee /tmp/test-output.txt
          set -e

          # Fail if there are ArkTS compilation errors
          if grep -q "ArkTS Compiler Error" /tmp/test-output.txt; then
            echo "::error::Unit test compilation failed with ArkTS errors"
            exit 1
          fi

          # Verify that the compilation step completed successfully
          if grep -q "Finished :entry:default@UnitTestArkTS" /tmp/test-output.txt; then
            echo "Unit test compilation succeeded"
          else
            echo "::error::Unit test compilation did not complete"
            exit 1
          fi

  publish:
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container: ghcr.io/bytemain/harmony-next-pipeline-docker/harmonyos-ci-image:v6.0.2.642
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 下载构建输出 artifact
      - name: Download Build Output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: $GITHUB_WORKSPACE/entry/build/default/outputs/default

      # 3. 签名 HAP 文件，如果存在签名文件和证书文件还有密钥文件和KEY_PASSWORD和KEYSTORE_PASSWORD
      - name: Sign HAP
        id: sign_hap
        if: env.SIGNING_CERT && env.SIGNING_PROFILE && env.SIGNING_KEY
        run: |
          cd $GITHUB_WORKSPACE
          java -jar /harmonyos-tools/command-line-tools/sdk/default/openharmony/toolchains/lib/hap-sign-tool.jar \
          sign-app \
          -keyAlias "ide_demo_app" \
          -signAlg "SHA256withECDSA" \
          -mode "localSign" \
          -appCertFile "${{ env.SIGNING_CERT }}" \
          -profileFile "${{ env.SIGNING_PROFILE }}" \
          -inFile "./entry/build/default/outputs/default/entry-default.hap" \
          -keystoreFile "${{ env.SIGNING_KEY }}" \
          -outFile "./entry/build/default/outputs/default/entry-default-signed.hap" \
          -keyPwd "${{ secrets.KEY_PASSWORD }}" \
          -keystorePwd "${{ secrets.KEYSTORE_PASSWORD }}" \
          -signCode "1"

      # 4. 创建 GitHub Release 并上传资产
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: ${{ github.ref_name }}
          files: |
            ${{ steps.sign_hap.outcome == 'success' && '$GITHUB_WORKSPACE/entry/build/default/outputs/default/entry-default-signed.hap' || '$GITHUB_WORKSPACE/entry/build/default/outputs/default/entry-default.hap' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
